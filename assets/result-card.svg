<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" font-family="'Helvetica Neue', Arial, sans-serif">
  <defs>
    <linearGradient id="cardbg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1B1F3B"/>
      <stop offset="1" stop-color="#2A2350"/>
    </linearGradient>
    <linearGradient id="logobg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1B1F3B"/>
      <stop offset="1" stop-color="#2A2350"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="1200" height="630" fill="url(#cardbg)"/>

  <!-- ===== header ===== -->
  <!-- logo badge (scaled) -->
  <g transform="translate(56,40) scale(0.305)">
    <rect x="8" y="8" width="240" height="240" rx="54" fill="url(#logobg)"/>
    <rect x="8" y="8" width="240" height="240" rx="54" fill="none" stroke="#ffffff" stroke-opacity="0.10" stroke-width="2"/>
    <ellipse cx="80" cy="170" rx="22" ry="50" fill="#7A4A24" transform="rotate(14 80 170)"/>
    <ellipse cx="176" cy="170" rx="22" ry="50" fill="#7A4A24" transform="rotate(-14 176 170)"/>
    <ellipse cx="128" cy="146" rx="60" ry="56" fill="#E2A968"/>
    <ellipse cx="128" cy="152" rx="20" ry="46" fill="#F5ECD9"/>
    <ellipse cx="128" cy="176" rx="37" ry="27" fill="#F5ECD9"/>
    <path d="M92 124 q11 -7 21 -2" stroke="#7A4A24" stroke-width="4.5" fill="none" stroke-linecap="round"/>
    <path d="M143 118 q11 -7 21 -1" stroke="#7A4A24" stroke-width="4.5" fill="none" stroke-linecap="round"/>
    <circle cx="104" cy="139" r="8.5" fill="#26262E"/>
    <circle cx="152" cy="139" r="8.5" fill="#26262E"/>
    <circle cx="107" cy="136" r="2.6" fill="#ffffff"/>
    <circle cx="155" cy="136" r="2.6" fill="#ffffff"/>
    <ellipse cx="128" cy="160" rx="13" ry="10" fill="#26262E"/>
    <ellipse cx="123" cy="157" rx="4" ry="2.4" fill="#6a6a76" opacity="0.7"/>
    <path d="M128 170 v9" stroke="#9A7238" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M128 179 q-13 9 -23 2" stroke="#9A7238" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M128 179 q13 9 23 2" stroke="#9A7238" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M84 101 Q 90 52 128 50 Q 166 52 172 101 Z" fill="#3A3F55"/>
    <path d="M85 93 Q128 105 171 93 L171 85 Q128 97 85 85 Z" fill="#FFC24B"/>
    <ellipse cx="128" cy="101" rx="84" ry="17" fill="#2E3244"/>
    <ellipse cx="128" cy="98" rx="84" ry="14" fill="#3A3F55"/>
    <rect x="205" y="200" width="13" height="42" rx="6.5" fill="#C9852A" transform="rotate(-45 211 221)"/>
    <circle cx="188" cy="184" r="26" fill="#BFE9FF" opacity="0.22"/>
    <path d="M184 171 q-7 0 -7 6.5 q0 6.5 -5 6.5 q5 0 5 6.5 q0 6.5 7 6.5" stroke="#ffffff" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M192 171 q7 0 7 6.5 q0 6.5 5 6.5 q-5 0 -5 6.5 q0 6.5 -7 6.5" stroke="#ffffff" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="188" cy="184" r="26" fill="none" stroke="#FFC24B" stroke-width="8"/>
    <path d="M172 176 q3 -8 13 -10" stroke="#ffffff" stroke-width="3.5" fill="none" stroke-linecap="round" opacity="0.85"/>
  </g>

  <text x="150" y="80" font-size="40" font-weight="700" fill="#ffffff" letter-spacing="1.5">TOOLHOUND</text>
  <text x="152" y="106" font-size="14.5" font-weight="600" fill="#FFC24B" letter-spacing="3">THE TOOL-CALL DETECTIVE</text>

  <rect x="902" y="58" width="242" height="34" rx="17" fill="#ffffff" fill-opacity="0.06" stroke="#ffffff" stroke-opacity="0.14"/>
  <text x="1023" y="80" font-size="13.5" font-weight="600" fill="#c3c2b7" letter-spacing="1.5" text-anchor="middle">MLX-NATIVE · APPLE SILICON</text>

  <line x1="56" y1="138" x2="1144" y2="138" stroke="#ffffff" stroke-opacity="0.10" stroke-width="1"/>

  <!-- ===== headline ===== -->
  <text x="56" y="196" font-size="44" font-weight="700" fill="#ffffff">Same benchmark. Opposite failures.</text>
  <text x="56" y="234" font-size="21" fill="#c3c2b7">Three small models fail tool calls for three different root causes — and one isn&#39;t the model&#39;s fault.</text>

  <!-- ===== columns ===== -->
  <!-- col 1: Qwen2.5-0.5B  (template bug) -->
  <g>
    <rect x="56" y="272" width="345" height="282" rx="20" fill="#ffffff" fill-opacity="0.045" stroke="#ffffff" stroke-opacity="0.09"/>
    <text x="84" y="324" font-size="25" font-weight="700" fill="#ffffff">Qwen2.5-0.5B</text>
    <rect x="84" y="342" width="158" height="36" rx="18" fill="#FFC24B"/>
    <text x="163" y="366" font-size="15" font-weight="700" fill="#1B1F3B" letter-spacing="1" text-anchor="middle">TEMPLATE BUG</text>
    <text x="84" y="416" font-size="16.5" fill="#d7d6cc"><tspan x="84" dy="0">Upstream chat-template bug —</tspan><tspan x="84" dy="23">the model never got a fair shot.</tspan><tspan x="84" dy="23" fill="#FFC24B" font-weight="600">Not its fault → file upstream.</tspan></text>
    <text x="84" y="500" font-size="12.5" font-weight="600" fill="#898781" letter-spacing="2">ARGS CORRECT</text>
    <text x="373" y="502" font-size="22" font-weight="700" fill="#ffffff" text-anchor="end">29%</text>
    <rect x="84" y="514" width="289" height="8" rx="4" fill="#ffffff" fill-opacity="0.12"/>
    <rect x="84" y="514" width="84" height="8" rx="4" fill="#aeb4c7"/>
  </g>

  <!-- col 2: Qwen2.5-1.5B  (model decision) -->
  <g>
    <rect x="427" y="272" width="345" height="282" rx="20" fill="#ffffff" fill-opacity="0.045" stroke="#ffffff" stroke-opacity="0.09"/>
    <text x="455" y="324" font-size="25" font-weight="700" fill="#ffffff">Qwen2.5-1.5B</text>
    <rect x="455" y="342" width="178" height="36" rx="18" fill="#3987E5"/>
    <text x="544" y="366" font-size="15" font-weight="700" fill="#ffffff" letter-spacing="1" text-anchor="middle">MODEL DECISION</text>
    <text x="455" y="416" font-size="16.5" fill="#d7d6cc"><tspan x="455" dy="0">Valid JSON, wrong tool or args.</tspan><tspan x="455" dy="23">A judgment problem — grammar</tspan><tspan x="455" dy="23">can&#39;t fix it.</tspan></text>
    <text x="455" y="500" font-size="12.5" font-weight="600" fill="#898781" letter-spacing="2">ARGS CORRECT</text>
    <text x="744" y="502" font-size="22" font-weight="700" fill="#ffffff" text-anchor="end">71%</text>
    <rect x="455" y="514" width="289" height="8" rx="4" fill="#ffffff" fill-opacity="0.12"/>
    <rect x="455" y="514" width="205" height="8" rx="4" fill="#aeb4c7"/>
  </g>

  <!-- col 3: Llama-3.2-3B  (model decision) -->
  <g>
    <rect x="798" y="272" width="345" height="282" rx="20" fill="#ffffff" fill-opacity="0.045" stroke="#ffffff" stroke-opacity="0.09"/>
    <text x="826" y="324" font-size="25" font-weight="700" fill="#ffffff">Llama-3.2-3B</text>
    <rect x="826" y="342" width="178" height="36" rx="18" fill="#3987E5"/>
    <text x="915" y="366" font-size="15" font-weight="700" fill="#ffffff" letter-spacing="1" text-anchor="middle">MODEL DECISION</text>
    <text x="826" y="416" font-size="16.5" fill="#d7d6cc"><tspan x="826" dy="0">Right format, wrong arg types</tspan><tspan x="826" dy="23">+ false abstentions. Judgment,</tspan><tspan x="826" dy="23">not formatting.</tspan></text>
    <text x="826" y="500" font-size="12.5" font-weight="600" fill="#898781" letter-spacing="2">ARGS CORRECT</text>
    <text x="1115" y="502" font-size="22" font-weight="700" fill="#ffffff" text-anchor="end">61%</text>
    <rect x="826" y="514" width="289" height="8" rx="4" fill="#ffffff" fill-opacity="0.12"/>
    <rect x="826" y="514" width="176" height="8" rx="4" fill="#aeb4c7"/>
  </g>

  <!-- ===== footer ===== -->
  <line x1="56" y1="580" x2="1144" y2="580" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1"/>
  <text x="56" y="606" font-size="17.5" fill="#c3c2b7">One accuracy score can&#39;t tell an upstream bug from the model&#39;s judgment. Toolhound can.</text>
  <text x="1144" y="606" font-size="17.5" font-weight="700" fill="#FFC24B" text-anchor="end">github.com/Code-byte404/toolhound</text>
</svg>
