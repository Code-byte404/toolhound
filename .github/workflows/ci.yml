name: ci

on: [push, pull_request]

jobs:
  logic-tests:
    # MLX only runs on Apple Silicon; plain CI covers the pure-logic layer
    # (parser / scorer / attribution / report) via synthetic fixtures.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install (logic deps only, mlx wheels unavailable on linux)
        run: |
          pip install pydantic>=2 rich numpy pyyaml pytest ruff
          pip install -e . --no-deps
      - run: ruff check .
      - run: pytest -q
